name: Android Build Robot

on:
  push:
    branches: [ main, master ]  # El robot se activa al hacer push a estas ramas
  workflow_dispatch:            # Te permite activar el robot manualmente desde la web de GitHub

jobs:
  compile:
    runs-on: ubuntu-22.04

    steps:
    - name: 1. Descargar Código del Repositorio
      uses: actions/checkout@v4

    - name: 2. Configurar Entorno Java (Requerido para Android SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 3. Instalar Dependencias del Sistema Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: 4. Instalar Buildozer y Cython
      run: |
        pip3 install --user --upgrade "buildozer>=1.5.0" "cython<3.0.0"
        # Añade las herramientas locales al PATH del sistema para poder invocar 'buildozer'
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: 5. Ejecutar Compilación con Buildozer
      run: |
        # 'yes' responde afirmativamente a todas las licencias del SDK de Android automáticamente
        yes | buildozer -v android debug

    - name: 6. Guardar y Extraer el APK Resultante
      uses: actions/upload-artifact@v4
      with:
        name: Mi-Navegador-App
        path: bin/*.apk
        retention-days: 7  # El APK estará disponible para descarga durante una semana
        
